<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docudex</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="drop-zone">
        <div class="drop-hint">Drop PDF files here or click to browse</div>
        <div id="main-content">
            <div id="documents-panel">
                <div class="panel-header-row">
                    <h1>Indexed Documents</h1>
                    <button id="queue-open" class="queue-open-btn">&#9776; Queue</button>
                </div>
                <table id="documents-table">
                    <thead>
                        <tr>
                            <th>Filename</th>
                            <th>File Path</th>
                            <th>Pages</th>
                            <th>Summary</th>
                            <th>Indexed</th>
                            <th>Tags</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="documents-body">
                    </tbody>
                </table>
                <div id="pagination">
                    <button id="prev-page" disabled>&larr; Prev</button>
                    <span id="page-info">Page 1</span>
                    <button id="next-page">Next &rarr;</button>
                </div>
            </div>
        </div>

        <div id="queue-panel">
            <div class="queue-header">
                <h2>Upload Queue</h2>
                <button id="refresh-queue">Refresh</button>
                <button id="queue-close" class="queue-close-btn">&times;</button>
            </div>
            <p class="queue-hint">PDF files only</p>
            <div id="queue-body" class="queue-cards"></div>
        </div>
    </div>

    <div id="overlay" class="hidden"></div>
    <div id="modal" class="hidden">
        <div class="modal-content">
            <h3 id="modal-title">Duplicate Detected</h3>
            <p id="modal-message"></p>
            <div class="modal-actions" id="modal-actions">
                <button id="modal-skip">Skip</button>
                <button id="modal-update">Update Existing</button>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let modalCallback = null;

        function hideModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('overlay').classList.add('hidden');
            modalCallback = null;
        }

        function showModal(title, message, buttons) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').textContent = message;
            const actionsContainer = document.getElementById('modal-actions');
            actionsContainer.innerHTML = '';
            buttons.forEach(btn => {
                const button = document.createElement('button');
                button.textContent = btn.text;
                if (btn.class) button.className = btn.class;
                button.addEventListener('click', () => {
                    if (modalCallback) modalCallback(btn.value);
                    hideModal();
                });
                actionsContainer.appendChild(button);
            });
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('overlay').classList.remove('hidden');
        }

        document.getElementById('modal-skip').addEventListener('click', () => {
            if (modalCallback) modalCallback('skip');
            hideModal();
        });

        document.getElementById('modal-update').addEventListener('click', () => {
            if (modalCallback) modalCallback('update');
            hideModal();
        });

        document.getElementById('overlay').addEventListener('click', hideModal);

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleString();
        }

        async function loadDocuments(page = 1) {
            const res = await fetch(`/api/documents?page=${page}`);
            const data = await res.json();
            const tbody = document.getElementById('documents-body');
            tbody.innerHTML = '';

            data.items.forEach(doc => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${doc.filename}</td>
                    <td title="${doc.file_path}">${doc.file_path}</td>
                    <td>${doc.total_pages}</td>
                    <td title="${doc.summary || ''}">${(doc.summary || '').substring(0, 60)}${(doc.summary || '').length > 60 ? '...' : ''}</td>
                    <td>${formatDate(doc.indexed_at)}</td>
                    <td>${(doc.tags || []).join(', ')}</td>
                    <td><button class="delete-btn" data-id="${doc.id}" data-type="document">Delete</button></td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('page-info').textContent = `Page ${data.page} of ${data.pages}`;
            document.getElementById('prev-page').disabled = page <= 1;
            document.getElementById('next-page').disabled = page >= data.pages;
            currentPage = data.page;
        }

        async function loadQueue() {
            const res = await fetch('/api/queue');
            const data = await res.json();
            const container = document.getElementById('queue-body');
            container.innerHTML = '';

            if (data.items.length === 0) {
                container.innerHTML = '<div class="queue-empty">No files queued</div>';
                return;
            }

            const sorted = [...data.items].sort((a, b) => {
                const statusOrder = { queued: 0, processing: 1, failed: 2, done: 3 };
                return (statusOrder[a.status] ?? 4) - (statusOrder[b.status] ?? 4);
            });

            sorted.forEach(item => {
                const card = document.createElement('div');
                const statusClass = `status-${item.status}`;
                card.className = 'queue-card';
                card.innerHTML = `
                    <div class="card-main">
                        <div class="card-info">
                            <div class="card-filename" title="${item.filename}">${item.filename}</div>
                            <div class="card-meta">
                                <span>${formatSize(item.file_size)}</span>
                                <span>${formatDate(item.added_at)}</span>
                            </div>
                        </div>
                        <div class="card-actions">
                            <span class="${statusClass}">${item.status}</span>
                            <button class="delete-btn" data-id="${item.id}" data-type="queue">Delete</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.addEventListener('click', async (e) => {
            if (e.target.classList.contains('delete-btn')) {
                const id = e.target.dataset.id;
                const type = e.target.dataset.type;
                showModal(
                    'Confirm Delete',
                    'Delete this file and its database entry?',
                    [
                        { text: 'Cancel', value: 'cancel' },
                        { text: 'Delete', value: 'delete', class: 'btn-danger' }
                    ]
                );
                modalCallback = async (action) => {
                    if (action === 'delete') {
                        const endpoint = type === 'queue' ? `/api/queue/${id}` : `/api/documents/${id}`;
                        await fetch(endpoint, { method: 'DELETE' });
                        if (type === 'document') {
                            loadDocuments(currentPage);
                        } else {
                            loadQueue();
                        }
                    }
                };
            }
        });

        document.getElementById('prev-page').addEventListener('click', () => {
            if (currentPage > 1) loadDocuments(currentPage - 1);
        });

        document.getElementById('next-page').addEventListener('click', () => {
            loadDocuments(currentPage + 1);
        });

        document.getElementById('refresh-queue').addEventListener('click', loadQueue);
        document.getElementById('queue-close').addEventListener('click', () => {
            queuePanel.classList.remove('open');
        });
        document.getElementById('queue-open').addEventListener('click', (e) => {
            e.stopPropagation();
            queuePanel.classList.add('open');
        });

        document.addEventListener('click', (e) => {
            if (queuePanel.classList.contains('open') &&
                !queuePanel.contains(e.target)) {
                queuePanel.classList.remove('open');
            }
        });

        const dropZone = document.getElementById('drop-zone');
        const queuePanel = document.getElementById('queue-panel');
        let dragCounter = 0;

        dropZone.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragCounter++;
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dragCounter--;
            if (dragCounter === 0) dropZone.classList.remove('drag-over');
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        dropZone.addEventListener('drop', async (e) => {
            e.preventDefault();
            dragCounter = 0;
            dropZone.classList.remove('drag-over');

            const files = e.dataTransfer.files;
            if (files.length === 0) return;

            const formData = new FormData();
            for (const file of files) {
                if (file.name.toLowerCase().endsWith('.pdf')) {
                    formData.append('files', file);
                }
            }

            if (formData.has('files')) {
                await fetch('/api/upload', { method: 'POST', body: formData });
                loadQueue();
            }
        });

        loadDocuments();
        loadQueue();
    </script>
</body>
</html>
